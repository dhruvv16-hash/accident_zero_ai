services:
  - type: web
    name: accidentzero-backend
    env: python
    plan: free
    rootDir: AccidentZeroAI (2)/AccidentZeroAI (2)/AccidentZeroAI/AccidentZeroAI
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
